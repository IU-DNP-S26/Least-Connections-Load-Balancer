services:

  converter1:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: mdconverter:latest
    container_name: converter1
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - proxy-network

  converter2:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: mdconverter:latest
    container_name: converter2
    ports:
      - "8082:80"
    restart: unless-stopped
    networks:
      - proxy-network

  converter3:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: mdconverter:latest
    container_name: converter3
    ports:
      - "8083:80"
    restart: unless-stopped
    networks:
      - proxy-network

  reverse-proxy:
    build:
      context: ./reverse_proxy
      dockerfile: Dockerfile
    container_name: reverse-proxy
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - proxy-network
    depends_on:
      - converter1
      - converter2
      - converter3

  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - proxy-network
    depends_on:
      - reverse-proxy

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - proxy-network
    depends_on:
      - prometheus

networks:
  proxy-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
